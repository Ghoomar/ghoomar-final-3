<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Ghoomar Yatra Gajraula</title>
    <meta name="description" content="Ghoomar Yatra is coming soon to Gajraula. Experience 1 Lakh sq.ft. of pure Rajasthani heritage - the next major highway destination.">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/page-colors.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="../assets/logos/ghoomar-mascot.svg">

    <style>
        :root {
            --yatra-accent: #b88a44;
            --yatra-burgundy: #8a1538;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: #000;
            overflow: hidden;
        }

        .coming-soon-hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            background-image: url('../assets/patterns/rajasthani_palace_premium.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .coming-soon-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .content-box {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 40px;
            animation: fadeInScale 1.2s ease-out;
        }

        .brand-logo {
            width: 180px;
            margin-bottom: 40px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .kicker {
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--yatra-accent);
            margin-bottom: 20px;
            font-weight: 600;
            display: block;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0 0 15px;
            line-height: 1.1;
            font-weight: 700;
        }

        .main-title .accent {
            color: var(--yatra-accent);
            font-style: italic;
        }

        .sub-features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0 45px;
            font-size: 1.1rem;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .feature-item i { color: var(--yatra-accent); }

        .cta-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--yatra-burgundy);
            color: #fff;
            box-shadow: 0 10px 25px rgba(138, 21, 56, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(138, 21, 56, 0.45);
            background: #b1234d;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-outline:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
        }

        .deco-bottom {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            z-index: 2;
            text-align: center;
            opacity: 0.6;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .sub-features { gap: 15px; }
            .feature-item { font-size: 0.9rem; padding: 8px 16px; }
            .content-box { padding: 20px; }
            .brand-logo { width: 140px; }
        }
    </style>
</head>
<body>

    <section class="coming-soon-hero">
        <div class="content-box">
            <img src="../assets/logos/ghoomar-thali.svg" alt="Ghoomar Logo" class="brand-logo">
            
            <span class="kicker">The next highway destination</span>
            <h1 class="main-title">Coming Soon in <span class="accent">Gajraula</span></h1>
            
            <div class="sub-features">
                <div class="feature-item">
                    <i class="fas fa-expand-arrows-alt"></i>
                    <span>1 Lakh sq.ft.</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-landmark"></i>
                    <span>Pure Heritage</span>
                </div>
                <div class="feature-item">
                    <i class="fas fa-utensils"></i>
                    <span>Rajasthani Magic</span>
                </div>
            </div>

            <div class="cta-group">
                <a href="https://maps.app.goo.gl/search/Ghoomar+Yatra+Gajraula" target="_blank" rel="noopener" class="btn btn-primary">
                    <i class="fas fa-map-marker-alt"></i> Open in Maps
                </a>
                <a href="https://wa.me/919910028098?text=I'm%20interested%20in%20knowing%20more%20about%20Ghoomar%20Yatra%20Gajraula" class="btn btn-outline" target="_blank" rel="noopener">
                    <i class="fab fa-whatsapp"></i> Inquire Now
                </a>
            </div>
        </div>

        <div class="deco-bottom">
            &copy; 2026 Ghoomar Traditional Thali. All Rights Reserved.
        </div>
    </section>

    <script src="../js/page-transition.js" defer></script>
    <script src="../js/script.js" defer></script>
</body>
</html>
